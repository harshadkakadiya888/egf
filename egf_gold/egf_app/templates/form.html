<!DOCTYPE html>
<html>
<head>
<title>Address Form</title>
</head>

<body>

<h2>Address Form</h2>

<form method="POST" action="/api/addresses/">
    {% csrf_token %}

  <input type="text" name="name1" placeholder="Name1"><br><br>
  <input type="email" name="email" placeholder="Email"><br><br>
  <input type="text" name="contact" placeholder="Contact"><br><br>
  <input type="text" name="country" placeholder="Country"><br><br>
  <input type="text" name="state" placeholder="State"><br><br>
  <input type="text" name="city" placeholder="City"><br><br>
  <input type="text" name="pincode" placeholder="Pincode"><br><br>

  <button type="submit">Submit</button>
</form>

</body>
</html>
